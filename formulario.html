<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <h2>Formulario de registro</h2>

    <form>

        <!-- Información personal -->
        <fieldset id="infoPersonal">
            <legend>Información personal</legend>

            <!-- Nombre -->
            <label for="nombre">Nombre del estudiante:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Andrés Toscano" autocomplete="name" required autofocus>
            <br>

            <!-- Email -->
            <label for="correo">Correo del estudiante:</label>
            <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" autocomplete="email" required>
            <br>

            <!-- Tel -->
            <label for="telefono">Teléfono del estudiante:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="3101234567" pattern="[0-9]{10}" autocomplete="tel" required>
            <br>

            <!-- Date -->
            <label for="nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="nacimiento" name="nacimiento" min="1940-01-01" max="2020-12-31" required>
            <br>

            <!-- Number -->
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" step="1" placeholder="Ej: 20" required>
            <br>

            <!-- Select -->
            <label for="genero">Género:</label>
            <select id="genero" name="genero" required>
                <option value="" disabled selected>Selecciona tu género</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
            </select>
            <br>
        </fieldset>
        <br>

        <!-- Configuración de cuenta -->
        <fieldset>
            <legend>Configuración de cuenta</legend>

            <!-- Password -->
            <label for="password">Crea una contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="new-password" required>
            <br>

            <!-- Confirm Password -->
            <label for="confirmarPass">Confirma la contraseña:</label>
            <input type="password" id="confirmarPass" name="confirmarPass" placeholder="Repite la contraseña" minlength="8" autocomplete="new-password" required>
            <br>
        </fieldset>

        <br>

        <!-- Información académica -->
        <fieldset id="infoAcademica">
            <legend>Información Académica</legend>

            <!-- Radio -->
            <p>¿Cuál es tu nivel académico?</p>

            <input type="radio" id="bachiller" name="nivelA" value="bachiller" required>
            <label for="bachiller">Bachiller</label>
            <br>

            <input type="radio" id="universitario" name="nivelA" value="universitario">
            <label for="universitario">Universitario</label>

            <!-- Checkbox -->
            <p>Intereses:</p>

            <input type="checkbox" id="html" name="intereses" value="HTML">
            <label for="html">HTML</label>
            <br>

            <input type="checkbox" id="css" name="intereses" value="CSS">
            <label for="css">CSS</label>
            <br>

            <input type="checkbox" id="js" name="intereses" value="JS">
            <label for="js">JS</label>
            <br><br>

            <!-- URL -->
            <label for="portafolio">Portafolio académico:</label>
            <input type="url" id="portafolio" name="portafolio" placeholder="https://tu-portafolio.com" autocomplete="url">
            <br>
        </fieldset>

        <br>

        <!-- Textarea -->
        <label for="proyeccion">
            ¿Por qué quieres ingresar a la plataforma de estudios?
        </label>
        <br>
        <textarea id="proyeccion" name="proyeccion" rows="4" maxlength="300" placeholder="Escribe aquí tu motivación..."></textarea>
        <br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>

    </form>

</body>

</html>
